name: fans-fan-light-switch
components:
  - id: main
    capabilities:
      - id: switch
        version: 1
      - id: fanMode
        version: 1
      - id: refresh
        version: 1
    categories:
      - name: Fan
  - id: light
    capabilities:
      - id: switch
        version: 1
    categories:
      - name: Light
deviceConfig:
  dashboard:
    states:
      - component: main
        capability: switch
        version: 1
        group: main
        composite: true
      - component: main
        capability: fanMode
        version: 1
    actions:
      - component: main
        capability: switch
        version: 1
        group: main
        values:
          - command: "on"
          - command: "off"
    basicPlus: []
  detailView:
    - component: main
      capability: switch
      version: 1
    - component: main
      capability: fanMode
      version: 1
    - component: light
      capability: switch
      version: 1
    - component: main
      capability: refresh
      version: 1
  automation:
    conditions:
      - component: main
        capability: switch
        version: 1
      - component: main
        capability: fanMode
        version: 1
      - component: light
        capability: switch
        version: 1
    actions:
      - component: main
        capability: switch
        version: 1
      - component: main
        capability: fanMode
        version: 1
      - component: light
        capability: switch
        version: 1
