name: plugs-switch-power-energy-voltage
components:
  - id: main
    capabilities:
      - id: switch
        version: 1
      - id: powerMeter
        version: 1
      - id: energyMeter
        version: 1
      - id: voltageMeasurement
        version: 1
      - id: concertmirror08464.powerPollIntervalV2
        version: 1
      - id: concertmirror08464.lastPowerResponseTime
        version: 1
      - id: refresh
        version: 1
    categories:
      - name: SmartPlug
deviceConfig:
  dashboard:
    states:
      - component: main
        capability: switch
        version: 1
        group: main
        composite: true
      - component: main
        capability: powerMeter
        version: 1
        group: main
        values:
          - label: " | {{power.value}}{{power.unit}}"
        composite: true
    actions:
      - component: main
        capability: switch
        version: 1
        group: main
        values:
          - command: "on"
          - command: "off"
    basicPlus: []
  detailView:
    - component: main
      capability: switch
      version: 1
    - component: main
      capability: powerMeter
      version: 1
    - component: main
      capability: energyMeter
      version: 1
    - component: main
      capability: voltageMeasurement
      version: 1
    - component: main
      capability: concertmirror08464.powerPollIntervalV2
      version: 1
    - component: main
      capability: concertmirror08464.lastPowerResponseTime
      version: 1
    - component: main
      capability: refresh
      version: 1
  automation:
    conditions:
      - component: main
        capability: switch
        version: 1
      - component: main
        capability: powerMeter
        version: 1
      - component: main
        capability: energyMeter
        version: 1
      - component: main
        capability: voltageMeasurement
        version: 1
      - component: main
        capability: concertmirror08464.powerPollIntervalV2
        version: 1
    actions:
      - component: main
        capability: switch
        version: 1
      - component: main
        capability: concertmirror08464.powerPollIntervalV2
        version: 1
