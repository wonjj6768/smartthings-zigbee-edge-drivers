name: safety-motion-illuminance-temp-humidity-battery
components:
  - id: main
    capabilities:
      - id: motionSensor
        version: 1
      - id: illuminanceMeasurement
        version: 1
      - id: temperatureMeasurement
        version: 1
      - id: relativeHumidityMeasurement
        version: 1
      - id: battery
        version: 1
      - id: refresh
        version: 1
