      capability: waterSensor
      version: 1
    - component: main
      capability: temperatureMeasurement
      version: 1
    - component: main
      capability: battery
      version: 1
    - component: main
      capability: refresh
      version: 1
  automation:
    conditions:
      - component: main
        capability: waterSensor
        version: 1
      - component: main
        capability: temperatureMeasurement
        version: 1
      - component: main
        capability: battery
        version: 1
    actions: []
