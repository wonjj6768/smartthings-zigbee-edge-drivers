name: sensors-aq-pm25-co2-temp-humidity-voc-formaldehyde
components:
- id: main
  capabilities:
  - id: fineDustSensor
    version: 1
  - id: carbonDioxideMeasurement
    version: 1
  - id: temperatureMeasurement
    version: 1
  - id: relativeHumidityMeasurement
    version: 1
  - id: tvocMeasurement
    version: 1
  - id: formaldehydeMeasurement
    version: 1
  - id: firmwareUpdate
    version: 1
  - id: refresh
    version: 1
  categories:
  - name: AirQualityDetector
preferences:
  - preferenceId: tempOffset
    explicit: true
  - preferenceId: humidityOffset
    explicit: true
deviceConfig:
  dashboard:
    states:
      - component: main
        capability: fineDustSensor
        version: 1
        group: main
        values:
          - label: "{{fineDustLevel.value}}{{fineDustLevel.unit}}"
        composite: true
      - component: main
        capability: temperatureMeasurement
        version: 1
        group: main
        values:
          - label: " {{temperature.value}}{{temperature.unit}}"
        composite: true
    actions: []
    basicPlus: []
  detailView:
    - component: main
      capability: fineDustSensor
      version: 1
    - component: main
      capability: carbonDioxideMeasurement
      version: 1
    - component: main
      capability: temperatureMeasurement
      version: 1
    - component: main
      capability: relativeHumidityMeasurement
      version: 1
    - component: main
      capability: tvocMeasurement
      version: 1
    - component: main
      capability: formaldehydeMeasurement
      version: 1
    - component: main
      capability: refresh
      version: 1
  automation:
    conditions:
      - component: main
        capability: fineDustSensor
        version: 1
      - component: main
        capability: carbonDioxideMeasurement
        version: 1
      - component: main
        capability: temperatureMeasurement
        version: 1
      - component: main
        capability: relativeHumidityMeasurement
        version: 1
      - component: main
        capability: tvocMeasurement
        version: 1
      - component: main
        capability: formaldehydeMeasurement
        version: 1
    actions: []
