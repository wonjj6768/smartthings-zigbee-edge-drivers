name: sensors-soil-temp-humidity-moisture-illuminance-ec-battery
components:
- id: main
  capabilities:
  - id: temperatureMeasurement
    version: 1
  # Air Humidity (공기습도)
  - id: relativeHumidityMeasurement
    version: 1
  # Soil Moisture (토양습도) - Custom capability
  - id: concertmirror08464.soilMoisture
    version: 1
  - id: illuminanceMeasurement
    version: 1
  # Soil EC (토양 전기전도도) - Custom capability
  - id: concertmirror08464.soilEc
    version: 1
  - id: battery
    version: 1
  - id: firmwareUpdate
    version: 1
  - id: refresh
    version: 1
  categories:
  - name: TempHumiditySensor
preferences:
  - preferenceId: tempOffset
    explicit: true
  - preferenceId: humidityOffset
    explicit: true
deviceConfig:
  dashboard:
    states:
      - component: main
        capability: temperatureMeasurement
        version: 1
        group: main
        values:
          - label: "{{temperature.value}}{{temperature.unit}}"
        composite: true
      - component: main
        capability: relativeHumidityMeasurement
        version: 1
        group: main
        values:
          - label: " {{humidity.value}}{{humidity.unit}}"
        composite: true
      - component: main
        capability: concertmirror08464.soilMoisture
        version: 1
        group: main
        values:
          - label: " {{soilMoisture.value}}{{soilMoisture.unit}}"
        composite: true
    actions: []
    basicPlus: []
  detailView:
    - component: main
      capability: temperatureMeasurement
      version: 1
    - component: main
      capability: relativeHumidityMeasurement
      version: 1
    - component: main
      capability: concertmirror08464.soilMoisture
      version: 1
    - component: main
      capability: illuminanceMeasurement
      version: 1
    - component: main
      capability: concertmirror08464.soilEc
      version: 1
    - component: main
      capability: battery
      version: 1
    - component: main
      capability: refresh
      version: 1
  automation:
    conditions:
      - component: main
        capability: temperatureMeasurement
        version: 1
      - component: main
        capability: relativeHumidityMeasurement
        version: 1
      - component: main
        capability: concertmirror08464.soilMoisture
        version: 1
      - component: main
        capability: illuminanceMeasurement
        version: 1
      - component: main
        capability: concertmirror08464.soilEc
        version: 1
      - component: main
        capability: battery
        version: 1
    actions: []
