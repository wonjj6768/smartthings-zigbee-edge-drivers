      - component: main
        capability: valve
        version: 1
      - component: main
        capability: temperatureMeasurement
        version: 1
      - component: main
        capability: concertmirror08464.waterConsumedUltrasonicLiters
        version: 1
      - component: main
        capability: concertmirror08464.autoCleanUltrasonicValve
        version: 1
      - component: main
        capability: concertmirror08464.meterId
        version: 1
      - component: main
        capability: concertmirror08464.batteryVoltage
        version: 1
    actions:
