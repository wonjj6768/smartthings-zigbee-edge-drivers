name: valves-valve
components:
  - id: main
    capabilities:
      - id: valve
        version: 1
      - id: refresh
        version: 1
    categories:
      - name: WaterValve
deviceConfig:
  dashboard:
    states:
      - component: main
        capability: valve
        version: 1
        group: main
        composite: true
    actions:
      - component: main
        capability: valve
        version: 1
        group: main
        values:
          - command: "open"
          - command: "close"
    basicPlus: []
  detailView:
    - component: main
      capability: valve
      version: 1
    - component: main
      capability: refresh
      version: 1
  automation:
    conditions:
      - component: main
        capability: valve
        version: 1
    actions:
      - component: main
        capability: valve
        version: 1
